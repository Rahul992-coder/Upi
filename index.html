<script>
// Random prize
const randomPrize = Math.floor(Math.random() * (450 - 160 + 1)) + 160;

// Set prize
document.getElementById('prizeAmount').textContent = randomPrize + ' Rs!';
document.getElementById('claimText').textContent = randomPrize + ' Rs!';
document.getElementById('modalPrizeText').textContent = randomPrize + ' Rs!';

// Channels
const channelUrls = [
    "https://t.me/channel1",
    "https://t.me/channel2",
    "https://t.me/channel3",
    "https://t.me/channel4",
    "https://t.me/channel5",
    "https://t.me/channel6",
    "https://t.me/freeup3k"
];

const redirectUrl = "https://t.me/redirectchannel";

// Track joins
const joinedChannels = new Array(channelUrls.length).fill(false);
const claimButton = document.getElementById('claimButton');
const channelButtons = document.querySelectorAll('.channel-btn');

// Join function
function joinChannel(index) {
    window.open(channelUrls[index], '_blank');

    joinedChannels[index] = true;

    channelButtons[index].classList.add('joined');
    channelButtons[index].innerHTML = '<i class="fas fa-check"></i> Joined';

    checkAllChannelsJoined();
}

// Check all joined
function checkAllChannelsJoined() {
    const allJoined = joinedChannels.every(c => c === true);
    claimButton.disabled = !allJoined;
}

// Modal open/close
function openModal() {
    document.getElementById('upiModal').style.display = 'flex';
    document.getElementById('countdown').textContent = 'Redirecting in 5 seconds...';
    document.getElementById('progressBar').style.width = '0%';
}

function closeModal() {
    document.getElementById('upiModal').style.display = 'none';
}

// Submit UPI
function submitUpi() {
    const upiId = document.getElementById('upiId').value.trim();

    if (!upiId || !upiId.includes('@')) {
        alert('Please enter a valid UPI ID');
        return;
    }

    let seconds = 5;
    const countdownElement = document.getElementById('countdown');
    const progressBar = document.getElementById('progressBar');

    countdownElement.style.display = 'block';
    progressBar.style.width = '100%';

    const interval = setInterval(() => {
        seconds--;
        countdownElement.textContent = `Redirecting in ${seconds} seconds...`;

        if (seconds <= 0) {
            clearInterval(interval);
            window.location.href = redirectUrl;
        }
    }, 1000);
}

// Events
claimButton.addEventListener('click', openModal);

window.addEventListener('click', function(e) {
    const modal = document.getElementById('upiModal');
    if (e.target === modal) closeModal();
});
</script>
